<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart — AeroGuard</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="assets/css/global.css" />
  <style>
    /* Cart-specific layout logic */
    .page-wrap {
      max-width: 1060px; margin: 0 auto;
      padding: 6rem 1.5rem; display: grid; grid-template-columns: 1fr;
      gap: 3rem; align-items: start;
    }
    @media (min-width: 860px) { .page-wrap { grid-template-columns: 1fr 400px; padding: 8rem 2rem; } }

    .cart-item {
      display: grid; grid-template-columns: 72px 1fr auto;
      gap: 1.2rem; align-items: center; padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    .item-thumb { width: 72px; height: 72px; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
    
    /* Sold Out States */
    .soldout-active { opacity: 0.5; pointer-events: none; }
    .soldout-reveal { display: none; margin-top: 1.5rem; border: 1px solid rgba(180,50,50,0.2); border-radius: 4px; overflow: hidden; }
    .soldout-reveal.show { display: block; animation: slideUp 0.4s ease; }
    
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .qty-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--offwhite);
      border: 1px solid var(--border);
      color: var(--purple-deep);
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      border-radius: 2px;
    }

    .qty-btn:hover {
      background: var(--purple-mid);
      color: white;
      border-color: var(--purple-mid);
    }
  </style>
</head>
<body>

<div id="nav-placeholder"></div>

<div class="page-wrap">
  <div class="cart-left">
    <div class="cart-header" style="margin-bottom: 2rem;">
      <p class="section-eyebrow">Your Selection</p>
      <h1 style="font-family: 'Raleway'; font-size: 2.5rem; color: var(--purple-deep);">Your Cart</h1>
    </div>

    <div id="emptyCart" style="display:none; text-align:center; padding: 3rem; border: 1px dashed var(--border);">
      <p>Your cart is empty.</p>
      <a href="index.html#products" class="btn-sm" style="display:inline-block; margin-top: 1rem;">Shop Products</a>
    </div>

    <div id="cartItemsList"></div>
  </div>

  <div class="cart-right">
    <div style="background: white; padding: 2rem; border: 1px solid var(--border); position: sticky; top: 100px;">
      <h3 style="font-family: 'Raleway'; margin-bottom: 1.5rem; border-bottom: 2px solid var(--gold); padding-bottom: 0.5rem;">Order Summary</h3>
      <div style="display:flex; justify-content: space-between; margin-bottom: 1rem;">
        <span>Subtotal</span>
        <span id="subtotalVal">$0.00</span>
      </div>
      <div style="display:flex; justify-content: space-between; margin-bottom: 1.5rem; color: #5a8a6e; font-weight: 500;">
        <span>Shipping</span>
        <span>Free</span>
      </div>
      <div style="display:flex; justify-content: space-between; font-weight: 700; font-size: 1.2rem; border-top: 1px solid var(--border); padding-top: 1rem;">
        <span>Total</span>
        <span id="totalVal">$0.00</span>
      </div>

      <button id="checkoutBtn" class="mailing-submit" style="width:100%; height: 50px; margin-top: 2rem;" onclick="initiateCheckout()">
        Proceed to Checkout
      </button>

      <div id="soldoutReveal" class="soldout-reveal">
        <div style="background: rgba(180,50,50,0.05); padding: 1.5rem; color: var(--purple-deep);">
          <p style="font-weight: 700; margin-bottom: 0.5rem;">Sold Out</p>
          <p style="font-size: 0.85rem; margin-bottom: 1rem; opacity: 0.8;">These items just went out of stock. Join the restock list to be notified first.</p>
          <input type="email" id="restockEmail" placeholder="your@email.com" class="mailing-input" style="width: 100%; margin-bottom: 0.5rem;">
          <button class="mailing-submit" style="width: 100%; height: 40px;" onclick="submitRestock()">Notify Me</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="assets/js/products.js"></script>
<script src="assets/js/tracking.js"></script>
<script src="assets/js/cart-engine.js"></script>
<script src="assets/js/components.js"></script>

<script>
  function renderCart() {
    const container = document.getElementById('cartItemsList');
    const emptyMsg = document.getElementById('emptyCart');
    const items = Object.entries(Cart.state).filter(([_, qty]) => qty > 0);
    
    container.innerHTML = '';
    
    if (items.length === 0) {
      emptyMsg.style.display = 'block';
      return;
    }

    let subtotal = 0;

    items.forEach(([name, qty]) => {
      const product = getProduct(name); // From products.js
      if (!product) return;

      subtotal += (product.price * qty);
      
      const row = document.createElement('div');
      row.className = 'cart-item';
      row.innerHTML = `
        <div class="item-thumb" style="background: ${product.color}">${product.icon}</div>
        <div>
          <p style="font-weight:700; color: var(--purple-deep);">${product.name}</p>
          <p style="font-size: 0.75rem; color: var(--mid);">${product.level}</p>
          <div style="margin-top: 0.5rem; display:flex; gap: 1rem; align-items:center;">
            <button class="qty-btn" onclick="updateQty('${product.name}', -1)" style="cursor:pointer;">-</button>
            <span>${qty}</span>
            <button class="qty-btn" onclick="updateQty('${product.name}', 1)" style="cursor:pointer;">+</button>
          </div>
        </div>
        <p style="font-weight:700; color: var(--gold);">$${product.price * qty}</p>
      `;
      container.appendChild(row);
    });

    document.getElementById('subtotalVal').textContent = `$${subtotal.toFixed(2)}`;
    document.getElementById('totalVal').textContent = `$${subtotal.toFixed(2)}`;
  }

  function updateQty(name, delta) {
    Cart.state[name] = (Cart.state[name] || 0) + delta;
    if (Cart.state[name] <= 0) delete Cart.state[name];
    Cart.save(); //
    renderCart();
    Cart.updateUI(); //
  }

  function initiateCheckout() {
    Tracker.event('InitiateCheckout', { cart: Cart.state }); //
    document.getElementById('checkoutBtn').style.display = 'none';
    document.getElementById('cartItemsList').classList.add('soldout-active');
    document.getElementById('soldoutReveal').classList.add('show');
  }

  function submitRestock() {
    const email = document.getElementById('restockEmail').value;
    if(email.includes('@')) {
      Tracker.event('RestockSignup', { email: email, items: Cart.state });
      alert('You are on the list!');
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderCart();
    Tracker.pageView('Cart Page');
  });
</script>
</body>
</html>
